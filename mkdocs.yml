# MSPM0G3507 Framework — MkDocs Material Configuration
# 嵌入式游戏机框架文档 | Embedded Game Console Framework Documentation
# Run:
#   mkdocs serve
#   mkdocs build --strict
#   mkdocs gh-deploy --force

# ── Site ──────────────────────────────────────────────
site_name: MSPM0G3507 Framework
site_description: TI MSPM0G3507 Embedded Framework — BSP / HAL / APP / FreeRTOS / VM Simulator
site_author: MSPM0G3507 Framework Team
site_url: https://OohShuo.github.io/mspm0g3507_framework/

strict: true
docs_dir: docs

# ── Repository ────────────────────────────────────────
repo_url: https://github.com/OohShuo/mspm0g3507_framework.git
repo_name: OohShuo/mspm0g3507_framework
edit_uri: edit/main/docs/

# ── Theme ─────────────────────────────────────────────
theme:
  name: material
  language: zh
  custom_dir: overrides
  
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换到深色模式

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换到浅色模式

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - navigation.instant
    - navigation.footer

    - search.highlight
    - search.suggest
    - search.share

    - content.code.copy
    - content.code.annotate
    - content.action.edit

    - toc.follow

  icon:
    repo: fontawesome/brands/github

# ── Plugins ───────────────────────────────────────────
# 不使用 mermaid2 插件；Material + pymdownx.superfences 可直接渲染 mermaid 代码块。
plugins:
  - search:
      lang:
        - zh
        - en

# ── Markdown Extensions ───────────────────────────────
markdown_extensions:
  - admonition

  - toc:
      permalink: true

  - attr_list
  - md_in_html
  - def_list
  - footnotes

  - pymdownx.details

  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

  - pymdownx.tabbed:
      alternate_style: true

  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true

  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tilde

  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

# ── Validation ────────────────────────────────────────
validation:
  nav:
    omitted_files: warn
    not_found: warn
    absolute_links: warn

  links:
    not_found: warn
    anchors: warn
    absolute_links: warn
    unrecognized_links: warn

# ── Navigation ─────────────────────────────────────────
# 保持当前 docs/ 简洁结构，不强行改成 zh/en 双语目录。
nav:
  - Home: index.md

  - 入门:
      - 快速开始: quick_start.md

  - 架构设计:
      - 项目架构: architecture.md
      - FreeRTOS 设计: freertos_design.md
      - 模块设计: modules.md
      - VM 仿真器: vm.md

  - 构建与工具:
      - 构建系统: build_system.md
      - 脚本说明: scripts.md

  - Windows 环境配置: win_env.md

  - 开发者指南:
      - 开发者指南: developer_guide.md

# ── Extra ─────────────────────────────────────────────
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/OohShuo/mspm0g3507_framework.git

  generator: false

copyright: Copyright &copy; 2026 MSPM0G3507 Framework Team
